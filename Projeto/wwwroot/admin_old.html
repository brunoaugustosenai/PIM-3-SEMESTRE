<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Administrador | ElectroNext</title>
  <link rel="stylesheet" href="style-loja.css">
</head>
<body>
<header>
  <div class="logo">Electro<span>Next</span> Admin</div>
  <a href="loja.html" style="color:#00d4ff">Ir para loja</a>
</header>
<div class="container" style="align-items:flex-start">
  <div class="produtos">
    <h2>Produtos</h2>
    <div class="card" style="margin-bottom:20px">
      <input id="id" type="hidden">
      <input id="nome" placeholder="Nome do produto">
      <input id="descricao" placeholder="Descrição">
      <input id="preco" type="number" step="0.01" placeholder="Preço">
      <input id="estoque" type="number" placeholder="Estoque">
      <input id="imagem" placeholder="URL/imagem. Ex: teclado.jpg">
      <button onclick="salvarProduto()">Salvar Produto</button>
      <button onclick="limparForm()">Novo</button>
      <p id="msg"></p>
    </div>
    <div id="listaProdutos"></div>
  </div>
  <div class="carrinho">
    <h2>Vendas</h2>
    <div id="listaVendas"></div>
  </div>
</div>
<script src="api.js"></script>
<script>
  async function carregar() {
    const produtos = await apiFetch('/api/produtos/admin');
    listaProdutos.innerHTML = produtos.map(p => `
      <div class="card" style="margin-bottom:10px">
        <strong>${p.nome}</strong><br>${moeda(p.precoVenda)} | Estoque: ${p.estoque} | ${p.ativo ? 'Ativo' : 'Inativo'}<br>
        <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
        <button onclick='excluir(${p.id})'>Desativar</button>
      </div>`).join('');

    const vendas = await apiFetch('/api/vendas');
    listaVendas.innerHTML = vendas.length ? vendas.map(v => `<p><strong>#${v.id}</strong> ${moeda(v.valorTotal)}<br><small>${new Date(v.dataVenda).toLocaleString('pt-BR')}</small></p>`).join('') : '<p>Nenhuma venda ainda.</p>';
  }
  function editar(p) { id.value=p.id; nome.value=p.nome; descricao.value=p.descricao||''; preco.value=p.precoVenda; estoque.value=p.estoque; imagem.value=p.imagemUrl||''; }
  function limparForm() { id.value=''; nome.value=''; descricao.value=''; preco.value=''; estoque.value=''; imagem.value=''; }
  async function salvarProduto() {
    try {
      const corpo = { nome:nome.value, descricao:descricao.value, precoVenda:Number(preco.value), estoque:Number(estoque.value), imagemUrl:imagem.value, ativo:true };
      if (id.value) await apiFetch(`/api/produtos/${id.value}`, { method:'PUT', body:JSON.stringify(corpo) });
      else await apiFetch('/api/produtos', { method:'POST', body:JSON.stringify(corpo) });
      msg.textContent = 'Produto salvo.'; limparForm(); carregar();
    } catch(e) { msg.textContent = e.message; }
  }
  async function excluir(produtoId) { await apiFetch(`/api/produtos/${produtoId}`, { method:'DELETE' }); carregar(); }
  carregar().catch(e => alert(e.message));
</script>
</body>
</html>
