<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | ElectroNext</title>
  <link rel="stylesheet" href="style-Telacompra.css">
</head>
<body>
<div class="progress"><div>1. Carrinho</div><div class="active">2. Pagamento</div><div>3. Confirmação</div></div>
<div class="container">
  <div class="box">
    <h3>Dados do Cliente</h3>
    <input id="nome" placeholder="Nome completo">
    <input id="cpf" placeholder="CPF / CNPJ">
    <h3>Endereço</h3>
    <input placeholder="Rua"><input placeholder="Número"><input placeholder="Cidade"><input placeholder="CEP">
  </div>
  <div class="box pagamento">
    <h3>Forma de Pagamento</h3>
    <label class="pix-destaque"><input type="radio" name="pagamento" checked> Pix</label>
    <label><input type="radio" name="pagamento"> Cartão de Crédito</label>
    <label><input type="radio" name="pagamento"> Boleto Bancário</label>
    <input placeholder="Número do cartão"><input placeholder="Validade (MM/AA)"><input placeholder="CVV">
  </div>
  <div class="box">
    <h3>Resumo do Pedido</h3>
    <div id="resumo"></div>
    <div class="resumo-item"><span>Frete</span><span style="color:var(--success);">Grátis</span></div>
    <div class="total"><span>Total:</span><span id="total">R$ 0,00</span></div>
    <button id="btnFinalizar">Finalizar Compra</button>
    <p id="mensagem"></p>
    <div class="seguro">🔒 Pagamento 100% seguro<br>Criptografia SSL de Ponta a Ponta</div>
  </div>
</div>
<script src="api.js"></script>
<script>
  const usuario = exigirLogin();
  const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
  if (usuario) nome.value = usuario.nome;

  function renderResumo() {
    let valorTotal = 0;
    resumo.innerHTML = '';
    if (!carrinho.length) resumo.innerHTML = '<p>Carrinho vazio.</p>';
    carrinho.forEach(item => {
      valorTotal += item.preco * item.quantidade;
      resumo.innerHTML += `<div class="resumo-item"><span>${item.nome} x ${item.quantidade}</span><span>${moeda(item.preco * item.quantidade)}</span></div>`;
    });
    document.getElementById('total').textContent = moeda(valorTotal);
  }

  document.getElementById('btnFinalizar').addEventListener('click', async () => {
    const msg = document.getElementById('mensagem');
    msg.textContent = '';
    if (!carrinho.length) { msg.textContent = 'Carrinho vazio.'; return; }
    try {
      const venda = await apiFetch('/api/vendas', {
        method: 'POST',
        body: JSON.stringify({ clienteId: usuario.id, itens: carrinho.map(i => ({ produtoId: i.produtoId, quantidade: i.quantidade })) })
      });
      localStorage.removeItem('carrinho');
      localStorage.setItem('ultimaVenda', JSON.stringify(venda));
      window.location.href = 'finalizacao.html';
    } catch (erro) { msg.textContent = erro.message; }
  });

  renderResumo();
</script>
</body>
</html>
